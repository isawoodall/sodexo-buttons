<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Button</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  /* Dark surface so white outline is visible */
  body{background:transparent;display:flex;align-items:center;justify-content:flex-start;padding:8px;font-family:'Open Sans',sans-serif;}

  /* ── Sodexo Outlined Neutral Button (on dark/image surfaces) ── */
  /* Default: transparent, white border+text | Hover: white ripple fills, navy text */
  .sdx-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 16px;
    height:48px;
    background:transparent;
    border:1px solid #ffffff;
    border-radius:0px 0px 16px 0px;
    font-family:'Open Sans',sans-serif;
    font-size:16px;
    font-weight:600;
    color:#ffffff;
    cursor:pointer;
    overflow:hidden;
    isolation:isolate;
    text-decoration:none;
    white-space:nowrap;
    transition:color 300ms ease;
  }

  /* White ripple fills in on hover */
  .sdx-btn::before{
    content:'';
    position:absolute;
    left:50%;
    top:50%;
    width:4px;
    height:2px;
    background:#ffffff;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(1);
    opacity:0;
    transition:transform 400ms cubic-bezier(0.4,0,0.2,1), opacity 300ms ease;
    z-index:0;
  }
  .sdx-btn:hover::before{
    transform:translate(-50%,-50%) scale(120);
    opacity:1;
  }
  .sdx-btn:hover{ color:#2A295C; }

  .sdx-btn__label{ position:relative; z-index:2; }

  .sdx-btn__icon{
    position:relative;
    width:24px;
    height:24px;
    overflow:hidden;
    flex-shrink:0;
    z-index:2;
  }
  .sdx-btn__icon svg{
    position:absolute;
    left:0;
    width:24px;
    height:24px;
    transition:top 300ms cubic-bezier(0.4,0,0.2,1);
  }
  .sdx-btn__icon .arrow-1{ top:0; }
  .sdx-btn__icon .arrow-2{ top:38px; }
  .sdx-btn:hover .arrow-1{ top:-38px; }
  .sdx-btn:hover .arrow-2{ top:0; }

  .sdx-btn:focus-visible{ outline:2px solid #7E8ACC; outline-offset:3px; }
  .sdx-btn:disabled{
    border-color:#737373;
    color:#737373;
    cursor:not-allowed;
    pointer-events:none;
  }
  .sdx-btn:disabled::before{ display:none; }
</style>
</head>
<body>
<a href="https://sodexo-ism.ivanticloud.com/Modules/SelfService/#knowledgeBase" class="sdx-btn">
  <span class="sdx-btn__label">Browse Knowledge Base</span>
  <span class="sdx-btn__icon" aria-hidden="true">
    <svg class="arrow-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    <svg class="arrow-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </span>
</a>
</body>
</html>
