<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Button</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:transparent;display:flex;align-items:center;justify-content:flex-start;padding:8px;font-family:'Open Sans',sans-serif;}

  /* ── Sodexo Download Button — Minor CTA ── */
  /* Underlined label + download icon that slides down on hover */
  /* Icon 1 exits upward; Icon 2 (waiting at top) falls into place */
  .sdx-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:0;
    height:28px;
    background:none;
    border:none;
    font-family:'Open Sans',sans-serif;
    font-size:16px;
    font-weight:600;
    color:#2A295C;
    cursor:pointer;
    text-decoration:none;
    white-space:nowrap;
  }

  /* Download icon container clips animation */
  .sdx-btn__icon{
    position:relative;
    width:24px;
    height:24px;
    overflow:hidden;
    flex-shrink:0;
  }
  .sdx-btn__icon svg{
    position:absolute;
    left:0;
    width:24px;
    height:24px;
    color:#DA2020; /* Red icons per Figma spec */
    transition:top 300ms cubic-bezier(0.4,0,0.2,1);
  }
  /* Download_1 = visible at rest (top:0), exits upward on hover */
  .sdx-btn__icon .dl-1{ top:0; }
  /* Download_2 = waiting below (top:38px), slides into view on hover */
  .sdx-btn__icon .dl-2{ top:38px; }

  .sdx-btn:hover .dl-1{ top:-38px; }
  .sdx-btn:hover .dl-2{ top:0; }

  /* Underline on label */
  .sdx-btn__label{
    text-decoration:underline;
    text-underline-offset:2px;
    flex-shrink:0;
  }

  .sdx-btn:disabled{ color:#737373; cursor:not-allowed; }
  .sdx-btn:disabled .sdx-btn__icon svg{ color:#737373; }
  .sdx-btn:focus-visible{ outline:2px solid #7E8ACC; outline-offset:3px; border-radius:2px; }
</style>
</head>
<body>
<a href="#" class="sdx-btn">
  <span class="sdx-btn__icon" aria-hidden="true">
    <!-- Download icon 1 (visible at rest) -->
    <svg class="dl-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12M7 11l5 5 5-5"/>
      <path d="M5 20h14"/>
    </svg>
    <!-- Download icon 2 (enters from below on hover) -->
    <svg class="dl-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12M7 11l5 5 5-5"/>
      <path d="M5 20h14"/>
    </svg>
  </span>
  <span class="sdx-btn__label">Download</span>
</a>
</body>
</html>
