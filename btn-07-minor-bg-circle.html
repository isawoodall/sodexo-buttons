<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Button</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:transparent;display:flex;align-items:center;justify-content:flex-start;padding:8px;font-family:'Open Sans',sans-serif;}

  /* ── Sodexo Minor CTA — Animated Background Arrow ── */
  /* Hover: red circle expands behind arrow icon, arrow turns white */
  .sdx-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:0;
    height:28px;
    background:none;
    border:none;
    font-family:'Open Sans',sans-serif;
    font-size:16px;
    font-weight:600;
    color:#2A295C;
    cursor:pointer;
    text-decoration:none;
    white-space:nowrap;
  }

  .sdx-btn__label{ flex-shrink:0; }

  /* Icon wrapper — circular background expands on hover */
  .sdx-btn__icon{
    position:relative;
    width:24px;
    height:24px;
    flex-shrink:0;
  }

  /* Red circle background — starts as tiny dot, expands */
  .sdx-btn__icon::before{
    content:'';
    position:absolute;
    left:50%;
    top:50%;
    width:2px;
    height:2px;
    background:#DA2020;
    border-radius:50%;
    transform:translate(-50%,-50%) scale(1);
    opacity:0;
    transition:transform 350ms cubic-bezier(0.4,0,0.2,1), opacity 250ms ease;
    z-index:0;
  }
  .sdx-btn:hover .sdx-btn__icon::before{
    transform:translate(-50%,-50%) scale(20);
    opacity:1;
  }

  .sdx-btn__icon svg{
    position:absolute;
    left:0;
    top:0;
    width:24px;
    height:24px;
    color:#DA2020;
    transition:color 250ms ease;
    z-index:1;
  }
  .sdx-btn:hover .sdx-btn__icon svg{ color:#ffffff; }

  .sdx-btn:disabled{ color:#737373; cursor:not-allowed; }
  .sdx-btn:disabled .sdx-btn__icon svg{ color:#737373; }
  .sdx-btn:focus-visible{ outline:2px solid #7E8ACC; outline-offset:3px; border-radius:2px; }
</style>
</head>
<body>
<a href="#" class="sdx-btn">
  <span class="sdx-btn__label">View All</span>
  <span class="sdx-btn__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </span>
</a>
</body>
</html>
